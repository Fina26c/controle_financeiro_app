name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:  # Permite executar manualmente

jobs:
  build:
    runs-on: ubuntu-latest  # Mudando para latest (mais disponível)
    
    steps:
    - name: 📥 Baixar código
      uses: actions/checkout@v4

    - name: 🐍 Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: 📦 Instalar dependências
      run: |
        sudo apt-get update
        sudo apt-get install -y git unzip python3-pip openjdk-17-jdk
        pip install --upgrade pip
        pip install cython buildozer

    - name: 📁 Extrair imagens
      run: unzip -o images.zip

    - name: 🛠️ Compilar APK
      run: buildozer android debug

    - name: 📤 Upload do APK
      uses: actions/upload-artifact@v4
      with:
        name: Controle-Financeiro-APK
        path: bin/*.apk
