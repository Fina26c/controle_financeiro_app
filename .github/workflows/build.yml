name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Baixar código
      uses: actions/checkout@v4

    - name: 🐍 Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: 📦 Instalar dependências do sistema
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git \
          unzip \
          python3-pip \
          python3-dev \
          autoconf \
          libtool \
          pkg-config \
          zlib1g-dev \
          libncurses5-dev \
          libncursesw5-dev \
          cmake \
          libffi-dev \
          libssl-dev \
          openjdk-17-jdk \
          openjdk-17-jre \
          wget

    - name: 📦 Instalar Python packages
      run: |
        python -m pip install --upgrade pip
        pip install cython
        pip install buildozer

    - name: 📁 Extrair imagens
      run: |
        unzip -o images.zip -d .

    - name: 🔧 Configurar Android SDK COM VERSÃO FIXA
      run: |
        # Criar estrutura de diretórios
        mkdir -p $HOME/android-sdk/cmdline-tools
        cd $HOME/android-sdk
        
        # Baixar command line tools
        wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -o commandlinetools-linux-*.zip
        mv cmdline-tools cmdline-tools/latest 2>/dev/null || true
        mkdir -p cmdline-tools/latest
        mv * cmdline-tools/latest/ 2>/dev/null || true
        
        # Configurar PATH
        echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
        echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
        
        # Aceitar licenças automaticamente
        yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses
        
        # Instalar componentes com VERSÕES ESPECÍFICAS (NÃO usar RC)
        $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "platform-tools"
        $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "platforms;android-33"
        $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "build-tools;33.0.2"  # Versão estável!
        $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "build-tools;34.0.0"  # Versão estável!
        
        # Adicionar build-tools ao PATH
        echo "$HOME/android-sdk/build-tools/33.0.2" >> $GITHUB_PATH
        echo "$HOME/android-sdk/build-tools/34.0.0" >> $GITHUB_PATH

    - name: 🔍 Verificar aidl
      run: |
        echo "🔍 Procurando aidl..."
        find $HOME/android-sdk -name "aidl" -type f | head -5
        echo "📋 Build-tools instaladas:"
        ls -la $HOME/android-sdk/build-tools/

    - name: 🛠️ Compilar APK
      run: |
        # Configurar buildozer para usar a versão correta
        export ANDROID_HOME=$HOME/android-sdk
        export PATH=$PATH:$ANDROID_HOME/build-tools/33.0.2
        buildozer android debug

    - name: 📤 Upload do APK
      uses: actions/upload-artifact@v4
      with:
        name: Controle-Financeiro-APK
        path: bin/*.apk