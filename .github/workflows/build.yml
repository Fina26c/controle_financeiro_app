name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Baixar código
      uses: actions/checkout@v4

    - name: 🐍 Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: 📦 Instalar dependências do sistema
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git \
          unzip \
          python3-pip \
          python3-dev \
          autoconf \
          libtool \
          pkg-config \
          zlib1g-dev \
          libncurses5-dev \
          libncursesw5-dev \
          cmake \
          libffi-dev \
          libssl-dev \
          openjdk-17-jdk \
          openjdk-17-jre \
          wget \
          rsync

    - name: 📦 Instalar Python packages
      run: |
        python -m pip install --upgrade pip
        pip install cython
        pip install buildozer

    - name: 📁 Extrair imagens
      run: |
        unzip -o images.zip -d .

    - name: 🔧 Instalar Android SDK no local que o Buildozer espera
      run: |
        # Criar a pasta exata que o Buildozer procura
        mkdir -p /home/runner/.buildozer/android/platform/android-sdk
        cd /home/runner/.buildozer/android/platform/android-sdk
        
        # Baixar command line tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q commandlinetools-linux-*.zip
        
        # Organizar cmdline-tools
        mkdir -p cmdline-tools/latest
        mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true
        
        # Configurar PATH
        echo "ANDROID_HOME=/home/runner/.buildozer/android/platform/android-sdk" >> $GITHUB_ENV
        echo "/home/runner/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
        
        # Aceitar licenças
        yes | /home/runner/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses
        
        # Instalar componentes
        /home/runner/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager "platform-tools"
        /home/runner/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager "platforms;android-33"
        /home/runner/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager "build-tools;33.0.2"
        
        # Adicionar build-tools ao PATH
        echo "/home/runner/.buildozer/android/platform/android-sdk/build-tools/33.0.2" >> $GITHUB_PATH
        
        # Verificar instalação
        echo "📂 Pastas do SDK:"
        ls -la /home/runner/.buildozer/android/platform/android-sdk/
        echo ""
        echo "🔍 Procurando aidl:"
        find /home/runner/.buildozer/android/platform/android-sdk -name "aidl" -type f

    - name: 🛠️ Compilar APK
      run: |
        buildozer android debug

    - name: 📤 Upload do APK
      uses: actions/upload-artifact@v4
      with:
        name: Controle-Financeiro-APK
        path: bin/*.apk