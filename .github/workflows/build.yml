name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Baixar código
      uses: actions/checkout@v4

    - name: 🐍 Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: 📦 Instalar dependências do sistema
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git \
          unzip \
          python3-pip \
          python3-dev \
          autoconf \
          libtool \
          pkg-config \
          zlib1g-dev \
          libncurses5-dev \
          libncursesw5-dev \
          cmake \
          libffi-dev \
          libssl-dev \
          openjdk-17-jdk \
          openjdk-17-jre \
          wget

    - name: 📦 Instalar Python packages
      run: |
        python -m pip install --upgrade pip
        pip install cython
        pip install buildozer

    - name: 📁 Extrair imagens
      run: |
        unzip -o images.zip -d .

    - name: 🔧 Configurar Android SDK (CAMINHO CORRIGIDO)
      run: |
        # Criar estrutura de diretórios
        mkdir -p $HOME/android-sdk
        cd $HOME/android-sdk
        
        # Baixar command line tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q commandlinetools-linux-*.zip
        
        # Criar a estrutura correta (cmdline-tools/latest)
        mkdir -p cmdline-tools/latest
        mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true
        # Mover tudo para o lugar certo
        rsync -a cmdline-tools/latest/ cmdline-tools/latest/ 2>/dev/null || true
        
        # Verificar se o sdkmanager existe
        ls -la $HOME/android-sdk/cmdline-tools/latest/bin/
        
        # Configurar PATH
        echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
        echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
        
        # Recarregar PATH
        export PATH=$PATH:$HOME/android-sdk/cmdline-tools/latest/bin
        
        # Aceitar licenças
        yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true
        
        # Instalar componentes com VERSÕES ESPECÍFICAS
        $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "platform-tools"
        $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "platforms;android-33"
        $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "build-tools;33.0.2"
        
        # Adicionar build-tools ao PATH
        echo "$HOME/android-sdk/build-tools/33.0.2" >> $GITHUB_PATH

    - name: 🔍 Verificar instalação
      run: |
        echo "📂 Conteúdo do ANDROID_HOME:"
        ls -la $ANDROID_HOME
        echo ""
        echo "📂 Build-tools:"
        ls -la $ANDROID_HOME/build-tools/ 2>/dev/null || echo "Build-tools ainda não instaladas"
        echo ""
        echo "🔍 Procurando aidl:"
        find $ANDROID_HOME -name "aidl" -type f 2>/dev/null || echo "Aidl não encontrado ainda"

    - name: 🛠️ Compilar APK
      run: |
        export ANDROID_HOME=$HOME/android-sdk
        export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/build-tools/33.0.2
        buildozer android debug

    - name: 📤 Upload do APK
      uses: actions/upload-artifact@v4
      with:
        name: Controle-Financeiro-APK
        path: bin/*.apk