name: Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-20.04
    
    steps:
    - name: 📥 Baixar código
      uses: actions/checkout@v4

    - name: 🐍 Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: 📦 Instalar dependências
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git \
          unzip \
          python3-pip \
          autoconf \
          libtool \
          pkg-config \
          zlib1g-dev \
          libncurses5-dev \
          libncursesw5-dev \
          cmake \
          libffi-dev \
          libssl-dev \
          openjdk-17-jdk \
          openjdk-17-jre
        pip install --upgrade pip
        pip install cython buildozer

    - name: 📁 Extrair imagens
      run: |
        unzip -o images.zip -d .

    - name: 🔧 Configurar Android SDK
      run: |
        # Baixar e instalar command-line tools
        wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
        unzip -o commandlinetools-linux-*.zip -d $HOME/android-sdk
        mkdir -p $HOME/android-sdk/cmdline-tools/latest
        mv $HOME/android-sdk/cmdline-tools/* $HOME/android-sdk/cmdline-tools/latest/ 2>/dev/null || true
        
        # Aceitar licenças
        yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses
        
        # Instalar componentes
        $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-30" "build-tools;30.0.3" "ndk;22.1.7171670"
        
        # Adicionar ao PATH
        echo "$HOME/android-sdk/build-tools/30.0.3" >> $GITHUB_PATH
        echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH

    - name: 🛠️ Compilar APK
      run: |
        buildozer android debug

    - name: 📤 Upload do APK
      uses: actions/upload-artifact@v4
      with:
        name: Controle-Financeiro-APK
        path: bin/*.apk
