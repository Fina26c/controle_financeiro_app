name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Baixar código
      uses: actions/checkout@v4

    - name: 🐍 Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: 📦 Instalar dependências do sistema
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git \
          unzip \
          python3-pip \
          python3-dev \
          autoconf \
          libtool \
          pkg-config \
          zlib1g-dev \
          libncurses5-dev \
          libncursesw5-dev \
          cmake \
          libffi-dev \
          libssl-dev \
          openjdk-17-jdk \
          openjdk-17-jre \
          wget

    - name: 📦 Instalar Python packages
      run: |
        python -m pip install --upgrade pip
        pip install cython
        pip install buildozer

    - name: 📁 Extrair imagens
      run: |
        unzip -o images.zip -d .

    - name: 🔧 Pré-configurar SDK manualmente
      run: |
        # Criar a estrutura que o Buildozer espera
        mkdir -p /home/runner/.buildozer/android/platform/android-sdk/cmdline-tools/latest
        
        # Baixar command line tools
        cd /home/runner/.buildozer/android/platform/android-sdk
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q commandlinetools-linux-*.zip
        
        # Mover para o local correto
        mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true
        
        # CRIAR LINK SIMBÓLICO para o local antigo (engana o Buildozer)
        mkdir -p /home/runner/.buildozer/android/platform/android-sdk/tools
        ln -sf /home/runner/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager /home/runner/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager 2>/dev/null || true
        mkdir -p /home/runner/.buildozer/android/platform/android-sdk/tools/bin
        cp /home/runner/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager /home/runner/.buildozer/android/platform/android-sdk/tools/bin/ 2>/dev/null || true

    - name: 🔧 Configurar Android SDK
      run: |
        export ANDROID_HOME=/home/runner/.buildozer/android/platform/android-sdk
        export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/tools/bin
        
        # Verificar se o sdkmanager existe
        echo "🔍 Procurando sdkmanager:"
        find $ANDROID_HOME -name "sdkmanager" -type f || echo "sdkmanager não encontrado"
        
        # Se encontrou em cmdline-tools, usar ele
        SDKMANAGER_CMD=$(find $ANDROID_HOME -name "sdkmanager" -type f | head -1)
        
        if [ -n "$SDKMANAGER_CMD" ]; then
          echo "✅ SDK Manager encontrado em: $SDKMANAGER_CMD"
          
          # Aceitar licenças
          yes | $SDKMANAGER_CMD --licenses
          
          # Instalar componentes
          $SDKMANAGER_CMD "platform-tools"
          $SDKMANAGER_CMD "platforms;android-33"
          $SDKMANAGER_CMD "build-tools;33.0.2"
          
          # Adicionar ao PATH
          echo "$ANDROID_HOME/build-tools/33.0.2" >> $GITHUB_PATH
        else
          echo "❌ SDK Manager não encontrado!"
          exit 1
        fi

    - name: 🛠️ Compilar APK
      run: |
        export ANDROID_HOME=/home/runner/.buildozer/android/platform/android-sdk
        export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/tools/bin:$ANDROID_HOME/build-tools/33.0.2
        buildozer android debug

    - name: 📤 Upload do APK
      uses: actions/upload-artifact@v4
      with:
        name: Controle-Financeiro-APK
        path: bin/*.apk