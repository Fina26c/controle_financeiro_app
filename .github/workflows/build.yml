name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Baixar código
      uses: actions/checkout@v4

    - name: 🐍 Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: 📦 Instalar dependências do sistema
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git \
          unzip \
          python3-pip \
          python3-dev \
          autoconf \
          libtool \
          pkg-config \
          zlib1g-dev \
          libncurses5-dev \
          libncursesw5-dev \
          cmake \
          libffi-dev \
          libssl-dev \
          openjdk-17-jdk \
          openjdk-17-jre \
          wget

    - name: 📦 Instalar Python packages
      run: |
        python -m pip install --upgrade pip
        pip install cython
        pip install buildozer

    - name: 📁 Extrair imagens
      run: |
        unzip -o images.zip -d .

    - name: 🔧 Configurar Android SDK (AUTO)
      run: |
        # Criar estrutura de diretórios
        mkdir -p $HOME/android-sdk/cmdline-tools
        cd $HOME/android-sdk
        
        # Baixar command line tools
        wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -o commandlinetools-linux-*.zip -d cmdline-tools
        mv cmdline-tools/cmdline-tools cmdline-tools/latest 2>/dev/null || true
        
        # Configurar PATH
        echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
        echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
        echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH
        echo "$HOME/android-sdk/build-tools/34.0.0" >> $GITHUB_PATH
        
        # Aceitar licenças
        yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses
        
        # Instalar componentes
        $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-33"
        $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "build-tools;34.0.0"

    - name: 🔍 Verificar aidl
      run: |
        find $HOME/android-sdk -name "aidl" -type f || echo "Aidl não encontrado"

    - name: 🛠️ Compilar APK
      run: |
        buildozer android debug

    - name: 📤 Upload do APK
      uses: actions/upload-artifact@v4
      with:
        name: Controle-Financeiro-APK
        path: bin/*.apk