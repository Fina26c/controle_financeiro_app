name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Baixar código
      uses: actions/checkout@v4

    - name: 📁 Extrair imagens
      run: |
        unzip -o images.zip -d .
        ls -la  # Verificar arquivos

    - name: 🛠️ Build APK com Buildozer Action
      uses: ArtemSBulgakov/buildozer-action@v1
      id: buildozer
      with:
        workdir: .
        buildozer_version: stable

    - name: 📤 Upload do APK
      uses: actions/upload-artifact@v4
      with:
        name: Controle-Financeiro-APK
        path: ${{ steps.buildozer.outputs.filename }}